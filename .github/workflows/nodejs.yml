name: Node.js CI

on: [ push, pull_request ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # https://github.com/nodejs/release
        node-version: [ 22, 24 ]
    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm install

      # Note to Copilot: 'npm install' already triggered 'prepare' (clean build).
      # Tests were skipped during install via npm_command check in Makefile.
      # We explicitly run 'npm test' here to provide a clear validation entry in CI.
      - run: npm test
